function addFloat(e,val,col,pre){const box=document.getElementById('EL_MONBOX');const rect=box.getBoundingClientRect();const f=document.createElement('div');f.className='floater';f.textContent=(pre||'')+fmt(val);f.style.color=col;f.style.left=Math.min(Math.max((e?e.clientX-rect.left:50+Math.random()*60),8),140)+'px';f.style.top=Math.max((e?e.clientY-rect.top-10:40),5)+'px';box.appendChild(f);setTimeout(()=>{if(f.parentNode)f.parentNode.removeChild(f);},900);}
function applyDmg(d){GS.mHP=Math.max(0,GS.mHP-d);if(GS.mHP<=0)killMon();else updateHP();}
function killMon(){const g=calcGold();GS.gold+=g;addFloat(null,g,'#FFD700','⚜+');const pz=getZone();GS.mIdx=(GS.mIdx+1)%10;if(GS.mIdx===0)GS.stage++;const nz=getZone();if(nz!==pz){bgZone=nz;showZoneBanner(ZN[nz]);}initMon();renderAll();}
function updateHP(){const pct=Math.max(0,GS.mHP/GS.mMaxHP*100);const bar=document.getElementById('EL_HPBAR');bar.style.width=pct+'%';bar.style.background=pct>50?'#3B6D11':pct>25?'#b06010':'#8a1010';document.getElementById('EL_HPC').textContent=fmt(GS.mHP);}
function showZoneBanner(name){const b=document.createElement('div');b.className='lvlup-banner';b.innerHTML=\`<div class="lvlup-title">Yeni Bölge!</div><div class="lvlup-sub">\${name}</div>\`;document.body.appendChild(b);setTimeout(()=>{if(b.parentNode)b.parentNode.removeChild(b);},2000);}
function switchTab(id,el){document.querySelectorAll('.tabbtn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));el.classList.add('active');document.getElementById('panel-'+id).classList.add('active');}
function useSkill(id){const sk=skills.find(s=>s.id===id);if(!sk||sk.cdtimer>0||GS.stage<sk.unlock)return;sk.cdtimer=sk.cd;if(id==='s1'||id==='s5'){frenzy=true;setTimeout(()=>{frenzy=false;},sk.dur*1000);}if(id==='s2'){const d=Math.max(calcDPS()*20,cDmg*cMult*100);applyDmg(d);addFloat(null,Math.floor(d),'#ff5500','☄️ ');}if(id==='s3'){goldRain=true;setTimeout(()=>{goldRain=false;},sk.dur*1000);}if(id==='s6'){const d=Math.max(calcDPS()*40,cDmg*cMult*500);applyDmg(d);addFloat(null,Math.floor(d),'#ff8800','🔥 ');}renderSkills();}
function buyUpg(id){const u=upgrades.find(x=>x.id===id);if(!u||u.done||GS.gold<u.cost)return;GS.gold-=u.cost;u.done=true;u.fn();renderUpgrades();updateTopbar();}
function buyHero(id){const h=heroes.find(x=>x.id===id);if(!h||GS.stage<h.unlock)return;const c=heroCost(h);if(GS.gold<c)return;GS.gold-=c;h.owned++;renderHeroes();updateTopbar();}
function buyUnit(id){const u=units.find(x=>x.id===id);if(!u||u.owned>=u.max||GS.stage<u.unlock)return;const c=unitCost(u);if(GS.gold<c)return;GS.gold-=c;u.owned++;renderUnits();renderAllies();updateTopbar();}
function doPrestige(){if(GS.stage<50)return;GS.prestige++;GS.gold=0;GS.stage=1;GS.mIdx=0;bgZone=0;heroes.forEach(h=>h.owned=0);units.forEach(u=>u.owned=0);upgrades.forEach(u=>u.done=false);cDmg=1;cMult=1;critCh=0;gMult=1;dMult=1;frenzy=false;goldRain=false;initMon();renderAll();}
function updateTopbar(){document.getElementById('EL_GOLD').textContent=fmt(GS.gold)+' altın';document.getElementById('EL_DPS').textContent=fmt(calcDPS());document.getElementById('EL_CDMG').textContent=fmt(Math.floor(cDmg*cMult*(frenzy?5:1)));document.getElementById('EL_STAGE').textContent=GS.stage;document.getElementById('EL_PRES').textContent=GS.prestige;const z=getZone();document.getElementById('EL_ZONE').textContent=['Orman','Bataklık','Yanardağ','Buzul','Cehennem'][z];}
function updateMonLabel(){const z=getZone();const m=MBZ[z][GS.mIdx%10];document.getElementById('EL_MNAME').textContent=m.n;document.getElementById('EL_MN').textContent=GS.mIdx+1;document.getElementById('EL_STG2').textContent=GS.stage;document.getElementById('EL_HPM').textContent=fmt(GS.mMaxHP);document.getElementById('EL_MONBOX').className='monbox'+(GS.mIdx===9?' boss-box':'');document.getElementById('EL_ZONENAME').textContent=ZN[z];updateHP();const zc=document.getElementById('EL_MAPZONES');zc.innerHTML='';for(let i=0;i<5;i++){const d=document.createElement('div');d.className='mzone '+(i<z?'done':i===z?'current':'locked');zc.appendChild(d);}}
function renderSkills(){const row=document.getElementById('EL_SKILLS');row.innerHTML='';skills.forEach(sk=>{const locked=GS.stage<sk.unlock,oncd=sk.cdtimer>0;const pct=oncd?Math.round((1-sk.cdtimer/sk.cd)*100):100;const d=document.createElement('div');d.className='skbtn'+(locked?' sklocked':oncd?' skoncd':'');d.innerHTML=\`<span class="skicon">\${sk.ic}</span><div class="sknm">\${sk.nm}</div><div class="sktimer">\${locked?'B.'+sk.unlock:oncd?Math.ceil(sk.cdtimer)+'s':''}</div><div class="cdbar" style="width:\${pct}%"></div>\`;if(!locked&&!oncd)d.onclick=()=>useSkill(sk.id);row.appendChild(d);});}
function renderUpgrades(){const container=document.getElementById('EL_UPG');container.innerHTML='';const cats={};upgrades.forEach(u=>{if(u.done||GS.stage<u.s)return;if(!cats[u.cat])cats[u.cat]=[];cats[u.cat].push(u);});if(Object.keys(cats).length===0){container.innerHTML='<p style="font-size:10px;color:#706030;text-align:center;padding:.8rem">Tüm geliştirmeler tamamlandı!</p>';return;}Object.entries(cats).forEach(([cat,items])=>{const sec=document.createElement('div');sec.className='upg-section';sec.textContent=cat;container.appendChild(sec);const grid=document.createElement('div');grid.className='upggrid';items.slice(0,4).forEach(u=>{const can=GS.gold>=u.cost;const el=document.createElement('div');el.className='upgcard'+(can?'':' noafford');el.innerHTML=\`<div class="upgtitle">\${u.nm}</div><div class="upgdesc">\${u.ds}</div><div class="upgcost">⚜ \${fmt(u.cost)}</div>\`;el.onclick=()=>buyUpg(u.id);grid.appendChild(el);});container.appendChild(grid);});}
function renderHeroes(){const list=document.getElementById('EL_HEROES');list.innerHTML='';heroes.forEach(h=>{const locked=GS.stage<h.unlock,c=heroCost(h),can=!locked&&GS.gold>=c;const card=document.createElement('div');card.className='ucard'+(locked?' ulocked':'');const dps=Math.floor(h.dps*h.owned*dMult*(1+GS.prestige*.6));card.innerHTML=\`<div class="uleft"><div class="uiconwrap">\${h.ic}</div><div><div class="unm">\${h.nm}\${locked?' 🔒 B.'+h.unlock:' ('+h.owned+')'}</div><div class="ust">\${fmt(dps)} DPS</div></div></div>\`;const btn=document.createElement('button');btn.className='ubtn'+(can?'':' noafford');btn.textContent='⚜ '+fmt(c);btn.onclick=()=>buyHero(h.id);card.appendChild(btn);list.appendChild(card);});}
function renderUnits(){const list=document.getElementById('EL_UNITS');list.innerHTML='';units.forEach(u=>{const locked=GS.stage<u.unlock,maxed=u.owned>=u.max,c=unitCost(u);const can=!locked&&!maxed&&GS.gold>=c;const card=document.createElement('div');card.className='ucard'+(locked?' ulocked':'');const dps=Math.floor(u.dps*u.owned*dMult);card.innerHTML=\`<div class="uleft"><div class="uiconwrap">\${u.ic}</div><div><div class="unm">\${u.nm}\${locked?' 🔒 B.'+u.unlock:''}</div><div class="ust">\${fmt(dps)} DPS | \${u.owned}/\${u.max}</div><div class="progress-wrap"><div class="progress-fill" style="width:\${u.owned/u.max*100}%"></div></div></div></div>\`;const btn=document.createElement('button');btn.className='ubtn'+(can?'':maxed?' maxed':' noafford');btn.textContent=maxed?'MAX ✓':'⚜ '+fmt(c);btn.onclick=()=>buyUnit(u.id);card.appendChild(btn);list.appendChild(card);});document.getElementById('EL_PAREA').style.display=GS.stage>=50?'block':'none';}
function renderAllies(){const row=document.getElementById('EL_ALLIES');row.innerHTML='';units.forEach(u=>{for(let i=0;i<u.owned;i++){const sp=document.createElement('span');sp.className='allysp';sp.textContent=u.ic;row.appendChild(sp);}});}
function renderAll(){updateTopbar();updateMonLabel();renderSkills();renderUpgrades();renderHeroes();renderUnits();renderAllies();}
let lastT=Date.now();
setInterval(()=>{const now=Date.now(),dt=(now-lastT)/1000;lastT=now;const dps=calcDPS();if(dps>0)applyDmg(dps*dt);skills.forEach(sk=>{if(sk.cdtimer>0)sk.cdtimer=Math.max(0,sk.cdtimer-dt);});updateTopbar();const skBtns=document.querySelectorAll('.skbtn');skills.forEach((sk,i)=>{const btn=skBtns[i];if(!btn)return;const oncd=sk.cdtimer>0;const locked=GS.stage<sk.unlock;btn.className='skbtn'+(locked?' sklocked':oncd?' skoncd':'');const timer=btn.querySelector('.sktimer');if(timer)timer.textContent=locked?'B.'+sk.unlock:oncd?Math.ceil(sk.cdtimer)+'s':'';const cdbar=btn.querySelector('.cdbar');if(cdbar){const pct=oncd?Math.round((1-sk.cdtimer/sk.cd)*100):100;cdbar.style.width=pct+'%';}});},100);
setInterval(()=>{renderUpgrades();const hl=document.getElementById('EL_HEROES');hl.querySelectorAll('.ubtn').forEach((btn,i)=>{if(i>=heroes.length)return;const h=heroes[i];const c=heroCost(h);const locked=GS.stage<h.unlock;const can=!locked&&GS.gold>=c;btn.className='ubtn'+(can?'':' noafford');});const ul=document.getElementById('EL_UNITS');ul.querySelectorAll('.ubtn').forEach((btn,i)=>{if(i>=units.length)return;const u=units[i];const maxed=u.owned>=u.max;const locked=GS.stage<u.unlock;const c=unitCost(u);const can=!locked&&!maxed&&GS.gold>=c;btn.className='ubtn'+(can?'':maxed?' maxed':' noafford');});},2000);
renderAll();
<\/script></body></html>`;
document.getElementById('gframe').srcdoc=html;
</script>
